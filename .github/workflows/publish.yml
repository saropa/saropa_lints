name: publish

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.5.3

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication with pub.dev
    steps:
      - uses: actions/checkout@v4

      # Use stable channel so the SDK is always available (no exact-version lookup failures).
      # Pubspec allows sdk: ">=3.6.0 <4.0.0", so any current stable is valid.
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Verify Dart SDK
        run: dart --version

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3: dart pub get"
            if dart pub get; then
              echo "dart pub get succeeded"
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::dart pub get failed after 3 attempts"
              exit 1
            fi
            echo "::warning::dart pub get failed, retrying in 10s..."
            sleep 10
          done

      # Nested packages are analyzed by `dart analyze` (SDK 3.11+); each needs its own
      # resolution so `package:<name>/...` URIs resolve (root `pub get` alone is not enough).
      # Discovers every `packages/*/pubspec.yaml` so new workspace packages do not require
      # workflow edits; uses the same retry pattern as root `pub get`.
      - name: Install nested package dependencies
        run: |
          set -euo pipefail
          nested_pub_get() {
            local dir="$1"
            for attempt in 1 2 3; do
              echo "Attempt $attempt/3: dart pub get --directory=$dir"
              if dart pub get --directory="$dir"; then
                echo "dart pub get --directory=$dir succeeded"
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "::error::dart pub get failed for $dir after 3 attempts"
                return 1
              fi
              echo "::warning::dart pub get failed for $dir, retrying in 10s..."
              sleep 10
            done
          }
          if [ ! -d packages ]; then
            echo "No packages/ directory; skipping nested pub get."
            exit 0
          fi
          shopt -s nullglob
          pkgs=(packages/*/pubspec.yaml)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "No nested packages under packages/; nothing to do."
            exit 0
          fi
          for pubspec in "${pkgs[@]}"; do
            nested_pub_get "$(dirname "$pubspec")"
          done

      - name: Strip self-plugin reference
        # The tier include file also contains a plugins: section that would
        # re-enable custom lint rules even after stripping the local one.
        # Remove both so dart analyze runs standard analysis only.
        run: |
          sed -i '/^include: package:saropa_lints/d' analysis_options.yaml
          sed -i '/^plugins:/,$d' analysis_options.yaml
      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

      - name: Dry run
        # Exit 65 = warnings (non-fatal), exit 66 = errors (fatal)
        run: |
          code=0
          dart pub publish --dry-run || code=$?
          if [ $code -eq 65 ]; then
            echo "::warning::Dry run has warnings (exit 65). Review output above."
          elif [ $code -ne 0 ]; then
            echo "::error::Dry run failed with exit code $code"
            exit 1
          fi

      - name: Publish to pub.dev
        run: dart pub publish --force
