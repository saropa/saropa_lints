name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PR: checkout head branch; push: checkout exact commit that triggered the run
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.10.8'
      - name: Install dependencies
        run: dart pub get
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Dry run (pub.dev validation)
        # Catches missing direct dependencies and other pub.dev rules; exit 65 = warnings, 66+ = errors
        run: |
          code=0
          dart pub publish --dry-run || code=$?
          if [ $code -eq 65 ]; then
            echo "::warning::Dry run has warnings (exit 65). Review output above."
          elif [ $code -ne 0 ]; then
            echo "::error::Dry run failed with exit code $code (e.g. missing dependency in pubspec.yaml)"
            exit 1
          fi
      - name: Format
        # Only format lib/ and test/; example_* use experimental features and are excluded from analyze
        run: dart format lib test
      # Only on PRs so we don't push to main (avoids permission/loop issues)
      - name: Commit formatting changes
        if: github.event_name == 'pull_request'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "Format Dart files" && git push)

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Same ref/token as analyze job so both jobs see identical code
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.10.8'
      - name: Install dependencies
        run: dart pub get
      - name: Run tests
        run: dart test
