##################################################################################################
##########################                                   #####################################
##########################         DEV DEPENDENCIES          #####################################
##########################                                   #####################################
##################################################################################################
dev_dependencies:
  # A full featured library for writing and running Dart tests across platforms.
  # https://pub.dev/packages/test
  test: ^1.31.0 # Unit testing framework
