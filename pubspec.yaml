# Package identity
name: saropa_lints

# Shown on pub.dev and in IDE package browsers
description: >-
  2134 custom lint rules with 254 quick fixes for Flutter and Dart.
  Static analysis for security, accessibility, and performance.

# SemVer version used by pub.dev and dependency resolution
version: 13.12.7

# SPDX license identifier shown on pub.dev
license: MIT

# Link shown on pub.dev package page
homepage: https://pub.dev/packages/saropa_lints

# Source code link shown on pub.dev
repository: https://github.com/saropa/saropa_lints

# Bug report link shown on pub.dev
issue_tracker: https://github.com/saropa/saropa_lints/issues

# Searchable categories on pub.dev
topics:
  - linter
  - static-analysis
  - code-quality
  - flutter
  - dart

# CLI executables (dart run saropa_lints <command>)
executables:
  saropa_lints: saropa_lints
  init: init
  write_config: write_config
  baseline: baseline
  diagnostic_baseline: diagnostic_baseline
  cross_file: cross_file
  severity_report: severity_report
  # Backward-compatible alias: forwards to severity_report. Kept so existing
  # `dart run saropa_lints:impact_report` invocations keep working after the
  # 2026-06-05 rename (LintImpact taxonomy collapsed into severity).
  impact_report: impact_report
  scan: scan
  quality_gate: quality_gate
  # Registered so the VS Code extension (and any consumer project) can invoke
  # `dart run saropa_lints:project_vibrancy` instead of needing the source path
  # `bin/project_vibrancy.dart`, which only resolves inside this repo and broke
  # the Code Health Dashboard for every downstream workspace.
  project_vibrancy: project_vibrancy
  # Project Health "size map" scan, invoked by the Saropa Project Map dashboard.
  project_health: project_health

# Dart SDK constraint (pure Dart package; Flutter topic tag provides discoverability)
environment:
  sdk: ">=3.9.0 <4.0.0" # detect: flutter doctor -v Dart version

# Runtime dependencies for lint rule implementation
##################################################################################################
##########################                                   #####################################
##########################           DEPENDENCIES            #####################################
##########################                                   #####################################
##################################################################################################
dependencies:
  # A framework and support code for building plugins for the analysis server.
  # https://pub.dev/packages/analysis_server_plugin
  analysis_server_plugin: ^0.3.4

  # This package provides a library that performs static analysis of Dart code.
  # https://pub.dev/packages/analyzer
  # CRITICAL: Must stay compatible with Flutter stable's exact `meta` pin.
  # Flutter stable (3.44.x, May 2026) pins meta to EXACTLY 1.18.0, so any
  # transitive dependency that demands a higher meta makes saropa_lints
  # unresolvable for Flutter consumers (`flutter pub add` resolution failure).
  #   - analyzer 12.x requires meta ^1.18.0 -> satisfied by 1.18.0 (OK).
  #   - analyzer 13.x requires meta ^1.18.3 -> NOT satisfied by 1.18.0 (BREAKS).
  # History: the original regression (commit 0bab4ea0, Apr 27 2026) was an
  # analyzer ^12 bump back when Flutter stable still pinned meta 1.17.0. That
  # blocker is gone now that stable ships meta 1.18.0; the live blocker is
  # analyzer 13's meta ^1.18.3 floor.
  #
  # Why the pin exists upstream: meta ships INSIDE the Flutter SDK (with
  # intl/collection/path/vector_math/async) at an EXACT version, so a new pub
  # release cannot break apps on an older SDK. analyzer is not itself pinned but
  # depends on meta, so analyzer's meta floor must stay <= Flutter's meta pin.
  # We cannot "widen below a hard floor", so this clears only when Flutter
  # stable bumps its bundled meta. Intentional and acknowledged-painful; tracked
  # for removal upstream:
  #   - rationale: https://github.com/dart-lang/sdk/blob/main/docs/Flutter-Pinned-Packages.md
  #   - unpin effort: https://github.com/flutter/flutter/issues/158050
  #
  ###### Do NOT raise the cap to allow analyzer ^13 until Flutter stable ships
  # meta ^1.18.3.
  analyzer: ">=9.0.0 <13.0.0"

  # A framework and support code for building plugins for the analysis server.
  # https://pub.dev/packages/analyzer_plugin
  # Capped below 0.15.0: analyzer_plugin 0.14.10 pulls analyzer 13.1.0 (meta
  # ^1.18.3, breaks Flutter consumers per the analyzer note above). The pub
  # solver backtracks to the highest 0.14.x that pairs with analyzer 12.x.
  analyzer_plugin: ">=0.11.0 <0.15.0"

  # Collections and utilities functions and classes related to collections.
  # https://pub.dev/packages/collection
  collection: ^1.19.1 # Used by bin/saropa_lints.dart, sort_imports_fix, code_quality_control_flow_rules

  # Annotations (@visibleForTesting, @immutable, @internal) imported directly by
  # 8 rule files (e.g. async_rules.dart, build_method_rules.dart). `dart pub
  # publish` rejects a package that imports `package:meta/meta.dart` without
  # declaring meta as a DIRECT dependency (CI Dart 3.12.2 errors with exit 65 on
  # the 13.12.7 tag; local 3.12.1 dry-run did not flag it, which is why it slipped
  # through). Constraint deliberately ^1.18.0, NOT ^1.18.3: Flutter stable pins
  # meta to EXACTLY 1.18.0, so a ^1.18.3 floor would make saropa_lints
  # unresolvable for Flutter consumers. ^1.18.0 accepts Flutter's 1.18.0 and the
  # 1.18.3 already resolved here transitively. See the analyzer note below for the
  # full meta-pin rationale — do NOT raise this floor.
  meta: ^1.18.0

  # # https://pub.dev/packages/json2yaml/changelog
  # json2yaml: ^3.0.1 # YAML serialization for CLI tool

  # A string-based path manipulation library. All of the path operations you know...
  # https://pub.dev/packages/path
  path: ^1.9.1 # Path manipulation and traversal safety for CLI tools

  # https://pub.dev/packages/pub_semver/changelog — rule pack semver gates (pubspec.lock)
  # Versions and version constraints implementing pub's versioning policy. This i...
  # https://pub.dev/packages/pub_semver
  pub_semver: ^2.2.0

  # # https://pub.dev/packages/yaml/changelog
  # yaml: ^3.1.3 # YAML parsing for CLI tool
  yaml: ^3.1.3

