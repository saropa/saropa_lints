# Package identity
name: saropa_lints
description: >-
  2057 custom lint rules with 132 quick fixes for Flutter and Dart.
  Static analysis for security, accessibility, and performance.
version: 9.5.0
license: MIT

# Project links for pub.dev
homepage: https://pub.dev/packages/saropa_lints
repository: https://github.com/saropa/saropa_lints
issue_tracker: https://github.com/saropa/saropa_lints/issues

# Searchable categories on pub.dev
topics:
  - linter
  - static-analysis
  - code-quality
  - flutter
  - dart

# CLI executables (dart run saropa_lints <command>)
executables:
  saropa_lints: saropa_lints
  init: init
  baseline: baseline
  impact_report: impact_report
  scan: scan

# Dart SDK constraint (pure Dart package; Flutter topic tag provides discoverability)
environment:
  sdk: ">=3.6.0 <4.0.0"

# Runtime dependencies for lint rule implementation (analyzer 9 for Flutter compatibility)
dependencies:
  analysis_server_plugin: ^0.3.4
  analyzer: ^9.0.0
  analyzer_plugin: ^0.13.0

  # https://pub.dev/packages/collection/changelog
  collection: ^1.18.0 # Used by bin/saropa_lints.dart, sort_imports_fix, code_quality_control_flow_rules

  # https://pub.dev/packages/json2yaml/changelog
  json2yaml: ^3.0.1 # YAML serialization for CLI tool

  # https://pub.dev/packages/path/changelog
  path: ^1.9.0 # Path manipulation and traversal safety for CLI tools

  # https://pub.dev/packages/yaml/changelog
  yaml: ^3.1.3 # YAML parsing for CLI tool

# Development-only dependencies
dev_dependencies:
  # https://pub.dev/packages/test/changelog
  test: ^1.29.0 # Unit testing framework
