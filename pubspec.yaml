# Package identity
name: saropa_lints
description: >-
  2134 custom lint rules with 254 quick fixes for Flutter and Dart.
  Static analysis for security, accessibility, and performance.
version: 10.10.0
license: MIT

# Project links for pub.dev
homepage: https://pub.dev/packages/saropa_lints
repository: https://github.com/saropa/saropa_lints
issue_tracker: https://github.com/saropa/saropa_lints/issues

# Searchable categories on pub.dev
topics:
  - linter
  - static-analysis
  - code-quality
  - flutter
  - dart

# CLI executables (dart run saropa_lints <command>)
executables:
  saropa_lints: saropa_lints
  init: init
  write_config: write_config
  baseline: baseline
  cross_file: cross_file
  impact_report: impact_report
  scan: scan

# Dart SDK constraint (pure Dart package; Flutter topic tag provides discoverability)
environment:
  sdk: ">=3.9.0 <4.0.0"

# Runtime dependencies for lint rule implementation
##################################################################################################
##########################                                   #####################################
##########################           DEPENDENCIES            #####################################
##########################                                   #####################################
##################################################################################################
dependencies:
  # A framework and support code for building plugins for the analysis server.
  # https://pub.dev/packages/analysis_server_plugin
  analysis_server_plugin: ^0.3.4
  # This package provides a library that performs static analysis of Dart code.
  # https://pub.dev/packages/analyzer
  analyzer: ^12.0.0
  # A framework and support code for building plugins for the analysis server.
  # https://pub.dev/packages/analyzer_plugin
  analyzer_plugin: ^0.14.7

  # Collections and utilities functions and classes related to collections.
  # https://pub.dev/packages/collection
  collection: ^1.19.1 # Used by bin/saropa_lints.dart, sort_imports_fix, code_quality_control_flow_rules

  # # https://pub.dev/packages/json2yaml/changelog
  # json2yaml: ^3.0.1 # YAML serialization for CLI tool

  # A string-based path manipulation library. All of the path operations you know...
  # https://pub.dev/packages/path
  path: ^1.9.1 # Path manipulation and traversal safety for CLI tools

  # https://pub.dev/packages/pub_semver/changelog — rule pack semver gates (pubspec.lock)
  # Versions and version constraints implementing pub's versioning policy. This i...
  # https://pub.dev/packages/pub_semver
  pub_semver: ^2.2.0

  # # https://pub.dev/packages/yaml/changelog
  # yaml: ^3.1.3 # YAML parsing for CLI tool

# Development-only dependencies

