# SAROPA LINTS CUSTOM CONFIG
# Settings that persist across tier changes and --reset.

# ANALYSIS SETTINGS
max_issues: 1000
output: both

# PLATFORM SETTINGS
# Disable platforms your project doesn't target.
platforms:
  ios: true
  android: true
  macos: false
  web: false
  windows: false
  linux: false

# ─────────────────────────────────────────────────────────────────────────────
# RULE OVERRIDES
# ─────────────────────────────────────────────────────────────────────────────
# FORMAT: rule_name: true/false
# Add your custom rule overrides below:

prefer_blank_line_after_declarations: true
prefer_blank_line_after_loop: true
prefer_blank_line_before_case: true
prefer_blank_line_before_constructor: true
prefer_blank_line_before_else: true
prefer_blank_line_before_method: true
prefer_blank_line_before_return: true
prefer_blank_lines_between_members: true
prefer_capitalized_comment_start: true
prefer_doc_comments_over_regular: true
prefer_fixme_format: true
prefer_no_commented_out_code: true
prefer_period_after_doc: true
prefer_readable_line_length: true
prefer_sentence_case_comments: true
prefer_single_blank_line_max: true
prefer_todo_format: true
