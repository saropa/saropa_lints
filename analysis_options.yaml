# SAROPA LINTS — package development analysis options
#
# This file configures `dart analyze` for the saropa_lints package itself.
# Consumer projects use `dart run saropa_lints:init` to generate their own.
#
# Plugin is loaded from this package (same name); no self-dependency.
# Tiers: essential (fewest) | recommended | professional | comprehensive | pedantic (all ~2000, 20k+ issues).
# cspell:disable

include: package:saropa_lints/tiers/recommended.yaml

analyzer:
  errors:
    todo: ignore
    # Analyzer 9 marks ClassDeclaration.body as experimental; ignore for analyzer-9 compatibility (8.0.x).
    experimental_member_use: ignore
  exclude:
    # require_database_close false-positive (rule's runWithReporter contains openDatabase regex)
    - "lib/src/rules/resources/resource_management_rules.dart"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/*.gen.dart"
    - "**/*.mocks.dart"
    - "**/*.config.dart"
    - "**/generated/**"
    - "build/**"
    - ".dart_tool/**"
    - "example/**"
    - "example_async/**"
    - "example_core/**"
    - "example_packages/**"
    - "example_platforms/**"
    - "example_style/**"
    - "example_widgets/**"
    - "self_check/**"
linter:
  rules:
    - curly_braces_in_flow_control_structures
