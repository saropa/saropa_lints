# SAROPA LINTS — package development analysis options
#
# This file configures `dart analyze` for the saropa_lints package itself.
# Consumer projects use `dart run saropa_lints:init` to generate their own.
#
# Plugin is loaded from this package (same name); no self-dependency.
# Tiers: essential (fewest) | recommended | professional | comprehensive | pedantic (all ~2000, 20k+ issues).
# cspell:disable


analyzer:
  errors:
    todo: ignore
    hack: ignore
    # Analyzer 9 marks ClassDeclaration.body as experimental; ignore for analyzer-9 compatibility (8.0.x).
    experimental_member_use: ignore
  exclude:
    # ───────────────────────────────────────────────────────────────────
    # Plugin self-source exclusions (FPs covered by rule patches in
    # CHANGELOG [Unreleased] but the running analyzer plugin uses a
    # pub.dev snapshot of saropa_lints, so local edits don't reach it
    # until publish — same belt-and-braces pattern as `bin/**` below).
    # ───────────────────────────────────────────────────────────────────
    # require_database_close FP — rule's own openDatabase regex.
    - "lib/src/rules/resources/resource_management_rules.dart"
    # avoid_purchase_in_sandbox_production FP — IAP URLs in own pattern.
    - "lib/src/rules/commerce/iap_rules.dart"
    # avoid_mixed_environments / avoid_string_substring FPs — env regex
    # patterns and pubspec-version slicing in own rule body.
    - "lib/src/rules/config/config_rules.dart"
    # require_unique_iv_per_encryption FP — `'IV.fromSecureRandom(16)'`
    # string literal inside FixKind constructor.
    - "lib/src/fixes/crypto/use_secure_random_iv_fix.dart"
    # require_android_permission_request FP — `RuleTimingTracker.record`.
    - "lib/src/native/saropa_context.dart"
    # prefer_platform_io_conditional / avoid_blocking_main_thread FPs —
    # CLI report writers legitimately use sync I/O and bare Platform.is*.
    - "lib/src/report/import_graph_tracker.dart"
    - "lib/src/report/report_consolidator.dart"
    # ───────────────────────────────────────────────────────────────────
    # Blanket plugin self-source exclusion (DEV-ONLY, NEVER SHIPPED).
    # ───────────────────────────────────────────────────────────────────
    # Why a wildcard: rule and fix code naturally contains the strings,
    # regexes, and API names it detects (e.g. AvoidAssetManifestJsonFix
    # contains the literal 'AssetManifest.json'; AvoidPrintInReleaseRule
    # source is full of `print` tokens). The plugin's own
    # `SaropaContext.isLintPluginSource` already skips /rules/, /fixes/,
    # /native/, /report/ — but the IDE-resident plugin snapshot lags
    # behind local source until the analyzer cache rebuilds. New source
    # subdirs (init/, baseline/, etc.) hit the same pattern before they
    # get added to that getter.
    #
    # Belt-and-braces: this exclude stops the host analyzer from running
    # plugin diagnostics on package source regardless of plugin cache
    # state. This is the package's OWN root analysis_options.yaml — it
    # is dev-only and is NOT shipped to consumers. Consumers regenerate
    # their own config via `dart run saropa_lints:init` from the tier
    # files in lib/tiers/, which inherit no exclusions from here.
    #
    # Trade-off: real type/lint errors in lib/** won't surface in the
    # IDE Problems panel. Validation paths still cover them: tests,
    # explicit `dart analyze` invocations against specific files, and
    # CI's full pipeline.
    - "lib/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/*.gen.dart"
    - "**/*.mocks.dart"
    - "**/*.config.dart"
    - "**/generated/**"
    - "build/**"
    - ".dart_tool/**"
    - "example/**"
    - "example_packages/**"
    - "test/fixtures/**"
    - "self_check/**"
    # CLI scripts in bin/ are pure command-line code: print() and sync I/O
    # are legitimate. The plugin itself now skips bin/ files in
    # SaropaContext._shouldSkipCurrentFile, but `dart analyze` here loads
    # a cached plugin snapshot from outside the workspace and won't pick
    # up that change until the cache rebuilds. Belt-and-braces: this
    # `analyzer.exclude` entry stops the noise at the host level too.
    - "bin/**"
    # Same rationale for tool/ — repo-local CLI utilities (codegen,
    # audits, benchmarks, ad-hoc maintenance). They never run on a
    # Flutter UI isolate, so `avoid_blocking_main_thread` and
    # `avoid_print_in_release` are unactionable there. The plugin's
    # `SaropaContext.isCliToolScript` skip handles this in-process, but
    # the cached plugin snapshot lags local edits until the analyzer
    # cache rebuilds, so exclude here as belt-and-braces.
    - "tool/**"
linter:
  rules:
    - curly_braces_in_flow_control_structures

